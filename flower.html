<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buquê de Flores Mágicas</title>
    <style>
        *, *::after, *::before {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        :root {
            --flower-color: #ff4da6;
            --flower-glow: #ff0080;
            --center-color: #ffeb3b;
            --stem-color: #2d6b38;
        }

        body {
            /* ALTERAÇÃO AQUI: Gradiente azul marinho profundo para parecer o espaço */
            background: radial-gradient(circle at center, #05162e 0%, #00040a 100%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }

        .flower-container {
            position: relative;
            width: 600px;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 60px;
        }

        .flower {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: bottom center;
            bottom: 40px;
        }

        .flower--1 { left: 50%; transform: translateX(-50%) rotate(-25deg); }
        .flower--1 .flower__line { height: 35vh; animation-delay: 0.2s; }

        .flower--2 { left: 50%; transform: translateX(-50%) rotate(-12deg); z-index: 2; }
        .flower--2 .flower__line { height: 45vh; animation-delay: 0.5s; }

        .flower--3 { left: 50%; transform: translateX(-50%); z-index: 3; }
        .flower--3 .flower__line { height: 52vh; }

        .flower--4 { left: 50%; transform: translateX(-50%) rotate(12deg); z-index: 2; }
        .flower--4 .flower__line { height: 45vh; animation-delay: 0.7s; }

        .flower--5 { left: 50%; transform: translateX(-50%) rotate(25deg); }
        .flower--5 .flower__line { height: 35vh; animation-delay: 0.4s; }

        .flower__line {
            width: 5px;
            height: 0;
            background: linear-gradient(to top, #15361a, var(--stem-color));
            border-radius: 10px;
            animation: growLine 2.5s forwards ease-in-out;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .flower__head {
            position: absolute;
            top: -40px;
            width: 80px;
            height: 80px;
            animation: bloom 2s 1.5s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .flower__petal {
            position: absolute;
            width: 35px;
            height: 70px;
            background: radial-gradient(circle at bottom, #fff 0%, var(--flower-color) 60%, var(--flower-glow) 100%);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 15px rgba(255, 77, 166, 0.3);
            transform-origin: bottom center;
            bottom: 20px;
        }

        .flower__petal--1 { transform: rotate(0deg); }
        .flower__petal--2 { transform: rotate(60deg); }
        .flower__petal--3 { transform: rotate(120deg); }
        .flower__petal--4 { transform: rotate(180deg); }
        .flower__petal--5 { transform: rotate(240deg); }
        .flower__petal--6 { transform: rotate(300deg); }

        .flower__center {
            position: absolute;
            width: 25px;
            height: 25px;
            background: var(--center-color);
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 0 20px var(--center-color), inset 0 0 10px orange;
            animation: glow 2s infinite alternate;
        }

        .light {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            width: 2px;
            height: 2px;
            box-shadow: 0 0 8px var(--center-color);
            animation: floatUp 6s infinite ease-out;
            opacity: 0;
        }

        @keyframes growLine { from { height: 0; } }
        @keyframes bloom { to { transform: scale(1) translateY(-20px); } }
        @keyframes glow { 
            from { transform: scale(0.9); filter: brightness(1); } 
            to { transform: scale(1.1); filter: brightness(1.3); } 
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-60vh) translateX(30px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="flower-container">
        <div class="flower flower--1"><div class="flower__line"></div><div class="flower__head"><div class="flower__petal flower__petal--1"></div><div class="flower__petal flower__petal--2"></div><div class="flower__petal flower__petal--3"></div><div class="flower__petal flower__petal--4"></div><div class="flower__petal flower__petal--5"></div><div class="flower__petal flower__petal--6"></div><div class="flower__center"></div></div></div>
        <div class="flower flower--2"><div class="flower__line"></div><div class="flower__head"><div class="flower__petal flower__petal--1"></div><div class="flower__petal flower__petal--2"></div><div class="flower__petal flower__petal--3"></div><div class="flower__petal flower__petal--4"></div><div class="flower__petal flower__petal--5"></div><div class="flower__petal flower__petal--6"></div><div class="flower__center"></div></div></div>
        <div class="flower flower--3"><div class="flower__line"></div><div class="flower__head"><div class="flower__petal flower__petal--1"></div><div class="flower__petal flower__petal--2"></div><div class="flower__petal flower__petal--3"></div><div class="flower__petal flower__petal--4"></div><div class="flower__petal flower__petal--5"></div><div class="flower__petal flower__petal--6"></div><div class="flower__center"></div></div></div>
        <div class="flower flower--4"><div class="flower__line"></div><div class="flower__head"><div class="flower__petal flower__petal--1"></div><div class="flower__petal flower__petal--2"></div><div class="flower__petal flower__petal--3"></div><div class="flower__petal flower__petal--4"></div><div class="flower__petal flower__petal--5"></div><div class="flower__petal flower__petal--6"></div><div class="flower__center"></div></div></div>
        <div class="flower flower--5"><div class="flower__line"></div><div class="flower__head"><div class="flower__petal flower__petal--1"></div><div class="flower__petal flower__petal--2"></div><div class="flower__petal flower__petal--3"></div><div class="flower__petal flower__petal--4"></div><div class="flower__petal flower__petal--5"></div><div class="flower__petal flower__petal--6"></div><div class="flower__center"></div></div></div>
    </div>

    <div id="lights-container"></div>

    <script>
        function createLight() {
            const container = document.getElementById('lights-container');
            const l = document.createElement('div');
            l.classList.add('light');
            l.style.left = (45 + Math.random() * 10) + '%'; 
            l.style.bottom = '20%';
            l.style.animationDuration = (3 + Math.random() * 3) + 's';
            container.appendChild(l);
            setTimeout(() => l.remove(), 6000);
        }
        setInterval(createLight, 200);
    </script>
</body>
</html>
