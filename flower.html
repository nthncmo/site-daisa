<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buquê de Flores Mágicas</title>
    <style>
        *, *::after, *::before {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        :root {
            --flower-color: #ff4da6;
            --flower-glow: #ff0080;
            --center-color: #ffeb3b;
        }

        body {
            background-color: #000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .flower-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 30px;
        }

        .flower {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: bottom center;
        }

        /* Configurações do Buquê (5 flores com alturas e ângulos diferentes) */
        .flower--1 { left: 42%; transform: rotate(-15deg); }
        .flower--1 .flower__line { height: 50vh; animation-delay: 0.2s; }

        .flower--2 { left: 46%; transform: rotate(-5deg); z-index: 2; }
        .flower--2 .flower__line { height: 62vh; animation-delay: 0.5s; }

        .flower--3 { left: 50%; transform: translateX(-50%); z-index: 3; }
        .flower--3 .flower__line { height: 70vh; }

        .flower--4 { left: 54%; transform: rotate(5deg); z-index: 2; }
        .flower--4 .flower__line { height: 62vh; animation-delay: 0.7s; }

        .flower--5 { left: 58%; transform: rotate(15deg); }
        .flower--5 .flower__line { height: 50vh; animation-delay: 0.4s; }

        /* Estilo do Caule */
        .flower__line {
            width: 4px;
            height: 0; /* Começa em 0 para a animação */
            background: linear-gradient(to top, #000, #15361a, #2d6b38);
            border-radius: 4px;
            animation: growLine 2.5s forwards ease-in-out;
        }

        /* Cabeça da Flor */
        .flower__head {
            position: absolute;
            top: -35px;
            width: 90px;
            height: 90px;
            animation: bloom 2.5s 1.5s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0);
        }

        .flower__petal {
            position: absolute;
            width: 40px;
            height: 80px;
            background: radial-gradient(circle at bottom, #fff 0%, var(--flower-color) 60%, var(--flower-glow) 100%);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 15px rgba(255, 77, 166, 0.4);
            bottom: 15px;
            left: 25px;
            transform-origin: bottom center;
        }

        .flower__petal--1 { transform: rotate(-35deg); }
        .flower__petal--2 { transform: rotate(0deg); height: 88px; z-index: 2; }
        .flower__petal--3 { transform: rotate(35deg); }

        .flower__center {
            position: absolute;
            width: 22px;
            height: 22px;
            background: var(--center-color);
            border-radius: 50%;
            bottom: 15px;
            left: 34px;
            z-index: 4;
            box-shadow: 0 0 25px var(--center-color), 0 0 50px #fff;
            animation: glow 2s infinite alternate;
        }

        /* Grama lateral para fechar o cenário */
        .grass {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            z-index: 5;
            pointer-events: none;
        }

        /* Partículas Amarelas */
        .light {
            position: absolute;
            background: var(--center-color);
            border-radius: 50%;
            width: 3px;
            height: 3px;
            box-shadow: 0 0 10px var(--center-color), 0 0 5px #fff;
            animation: floatUp 5s infinite ease-out;
            opacity: 0;
            z-index: 1;
        }

        @keyframes growLine {
            from { height: 0; }
            /* O valor final é definido individualmente nas classes flower-- */
        }

        @keyframes bloom {
            to { transform: scale(1); }
        }

        @keyframes glow {
            from { opacity: 0.8; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1.1); }
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-70vh) translateX(15px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="flower-container">
        <div class="flower flower--1"><div class="flower__line"></div><div class="flower__head"><div class="flower__petal flower__petal--1"></div><div class="flower__petal flower__petal--2"></div><div class="flower__petal flower__petal--3"></div><div class="flower__center"></div></div></div>
        <div class="flower flower--2"><div class="flower__line"></div><div class="flower__head"><div class="flower__petal flower__petal--1"></div><div class="flower__petal flower__petal--2"></div><div class="flower__petal flower__petal--3"></div><div class="flower__center"></div></div></div>
        <div class="flower flower--3"><div class="flower__line"></div><div class="flower__head"><div class="flower__petal flower__petal--1"></div><div class="flower__petal flower__petal--2"></div><div class="flower__petal flower__petal--3"></div><div class="flower__center"></div></div></div>
        <div class="flower flower--4"><div class="flower__line"></div><div class="flower__head"><div class="flower__petal flower__petal--1"></div><div class="flower__petal flower__petal--2"></div><div class="flower__petal flower__petal--3"></div><div class="flower__center"></div></div></div>
        <div class="flower flower--5"><div class="flower__line"></div><div class="flower__head"><div class="flower__petal flower__petal--1"></div><div class="flower__petal flower__petal--2"></div><div class="flower__petal flower__petal--3"></div><div class="flower__center"></div></div></div>
    </div>

    <div class="grass" id="grass-container"></div>
    <div id="lights-container"></div>

    <script>
        const grassContainer = document.getElementById('grass-container');
        for(let i = 0; i < 60; i++) {
            let blade = document.createElement('div');
            blade.style.position = 'absolute';
            blade.style.bottom = '0';
            blade.style.width = '2px';
            blade.style.height = (30 + Math.random() * 80) + 'px';
            blade.style.background = 'linear-gradient(to top, #000, #1a4421)';
            blade.style.left = Math.random() * 100 + '%';
            blade.style.transform = `rotate(${-20 + Math.random() * 40}deg)`;
            blade.style.opacity = 0.5;
            grassContainer.appendChild(blade);
        }

        // Sistema de partículas concentrado no buquê
        function createLight() {
            const l = document.createElement('div');
            l.classList.add('light');
            // Concentra as partículas entre 40% e 60% da largura da tela (onde está o buquê)
            l.style.left = (40 + Math.random() * 20) + '%'; 
            l.style.bottom = '10%';
            l.style.animationDuration = (4 + Math.random() * 3) + 's';
            document.getElementById('lights-container').appendChild(l);
            setTimeout(() => l.remove(), 6000);
        }
        setInterval(createLight, 150); // Mais partículas saindo
    </script>
</body>
</html>
