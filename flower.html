<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Flores Brilhantes</title>
    <style>
        *, *::after, *::before {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-color: #000;
            --glass-color: #1a4421;
            --flower-color: #ff4da6;
            --flower-center: #ffeb3b;
        }

        body {
            background-color: #020205; /* Fundo espaço escuro para combinar com o seu projeto */
            display: flex;
            align-items: flex-end;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .flower-container {
            position: relative;
            transform: scale(0.8); /* Ajuste o tamanho geral aqui */
        }

        /* Caule principal */
        .flower {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Os 3 caules */
        .flower--1 { left: 30%; transform: rotate(-15deg); bottom: 20px; z-index: 1;}
        .flower--2 { left: 50%; bottom: 40px; z-index: 2;}
        .flower--3 { left: 70%; transform: rotate(15deg); bottom: 20px; z-index: 1;}

        .flower__line {
            width: 8px;
            height: 400px;
            background-image: linear-gradient(to top, #000, #1a4421, #2d6b38);
            border-radius: 4px;
            animation: growLine 2s forwards;
            transform-origin: bottom center;
        }

        /* Pétalas */
        .flower__head {
            position: absolute;
            top: -20px;
            width: 100px;
            height: 100px;
            animation: bloom 3s 1s forwards;
            transform: scale(0);
        }

        .flower__petal {
            position: absolute;
            width: 40px;
            height: 80px;
            background: radial-gradient(circle at bottom, #fff 0%, var(--flower-color) 70%, #b3145e 100%);
            border-radius: 50% 50% 10% 10%;
            box-shadow: 0 0 20px rgba(255, 77, 166, 0.4);
            bottom: 20px;
            left: 30px;
            transform-origin: bottom center;
        }

        .flower__petal:nth-child(1) { transform: rotate(-40deg); }
        .flower__petal:nth-child(2) { transform: rotate(0deg); height: 85px; bottom: 25px; z-index: 2;}
        .flower__petal:nth-child(3) { transform: rotate(40deg); }

        /* Centro da Flor e Brilho */
        .flower__center {
            position: absolute;
            width: 30px;
            height: 15px;
            background: var(--flower-center);
            border-radius: 50%;
            bottom: 15px;
            left: 35px;
            z-index: 3;
            box-shadow: 0 0 30px var(--flower-center), 0 0 50px #fff;
        }

        /* Grama e Folhas do fundo */
        .grass {
            position: absolute;
            bottom: 0;
            width: 100vw;
            height: 200px;
            pointer-events: none;
            z-index: 3;
        }

        .grass-blade {
            position: absolute;
            bottom: -50px;
            width: 15px;
            height: 250px;
            background: linear-gradient(to top, #000, #15361a, #235c2b);
            border-radius: 50% 50% 0 0;
            transform-origin: bottom center;
        }

        /* Partículas de luz subindo */
        .light {
            position: absolute;
            background: var(--flower-center);
            border-radius: 50%;
            width: 4px;
            height: 4px;
            box-shadow: 0 0 10px var(--flower-center);
            animation: floatUp 4s infinite ease-in-out;
            opacity: 0;
        }

        @keyframes growLine {
            0% { height: 0; }
            100% { height: 350px; }
        }

        @keyframes bloom {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-300px) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="flower-container">
        <div class="flower flower--1">
            <div class="flower__line"></div>
            <div class="flower__head">
                <div class="flower__petal"></div>
                <div class="flower__petal"></div>
                <div class="flower__petal"></div>
                <div class="flower__center"></div>
            </div>
        </div>

        <div class="flower flower--2">
            <div class="flower__line"></div>
            <div class="flower__head">
                <div class="flower__petal"></div>
                <div class="flower__petal"></div>
                <div class="flower__petal"></div>
                <div class="flower__center"></div>
            </div>
        </div>

        <div class="flower flower--3">
            <div class="flower__line"></div>
            <div class="flower__head">
                <div class="flower__petal"></div>
                <div class="flower__petal"></div>
                <div class="flower__petal"></div>
                <div class="flower__center"></div>
            </div>
        </div>
    </div>

    <div class="grass" id="grass-container"></div>
    <div id="lights-container"></div>

    <script>
        // Gerar matinhos/folhas na base
        const grassContainer = document.getElementById('grass-container');
        for(let i = 0; i < 30; i++) {
            let blade = document.createElement('div');
            blade.classList.add('grass-blade');
            blade.style.left = Math.random() * 100 + 'vw';
            blade.style.height = (100 + Math.random() * 200) + 'px';
            let rotation = -30 + Math.random() * 60;
            blade.style.transform = `rotate(${rotation}deg)`;
            blade.style.opacity = 0.5 + Math.random() * 0.5;
            grassContainer.appendChild(blade);
        }

        // Gerar luzinhas mágicas voando das flores
        const lightsContainer = document.getElementById('lights-container');
        for(let i = 0; i < 40; i++) {
            let light = document.createElement('div');
            light.classList.add('light');
            light.style.left = (30 + Math.random() * 40) + 'vw'; // Concentrado perto das flores
            light.style.bottom = (100 + Math.random() * 200) + 'px';
            light.style.animationDelay = (Math.random() * 4) + 's';
            light.style.animationDuration = (3 + Math.random() * 3) + 's';
            lightsContainer.appendChild(light);
        }
    </script>
</body>
</html>
