<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flor Neon Cósmica</title>
    <style>
        /* Estilos Globais e Fundo Cósmico */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Fundo Gradiente e Bokeh */
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 221, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 217, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(0, 0, 139, 0.3) 0%, #000 70%);
            /* Fonte Modern Sans-Serif */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container Principal */
        .container {
            width: 90%;
            max-width: 400px; /* Mantém a proporção vertical */
            height: 90%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Texto no final, flores no topo */
            align-items: center;
            position: relative;
        }

        /* --- Flores em SVG (Neon) --- */
        /* Usamos SVG para desenhar as formas complexas das flores de forma limpa e escalável. */
        .flowers-svg {
            width: 100%;
            height: auto;
            position: absolute;
            top: 10%; /* Posicionamento das flores */
            left: 0;
            z-index: 1; /* Flores atrás do texto */
        }

        /* Efeitos de Filtro para o Brilho Neon */
        .neon-filter {
            filter: blur(2px) drop-shadow(0 0 5px #ff00de) drop-shadow(0 0 10px #ff00de) drop-shadow(0 0 20px #ff00de);
        }
        .neon-center-filter {
            filter: blur(1px) drop-shadow(0 0 4px #ffda00) drop-shadow(0 0 8px #ffda00);
        }

        /* --- Texto Centrado e Brilhante --- */
        .text-content {
            width: 100%;
            color: #fff;
            text-align: center;
            z-index: 2; /* Texto na frente das flores */
            margin-bottom: 30px; /* Espaçamento da base */
            line-height: 1.4;
            /* Brilho do Texto */
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 15px #ff00de,
                0 0 20px #ff00de,
                0 0 30px #ff00de;
        }

        .text-content p {
            margin: 0;
        }

        .main-quote {
            font-size: 1.1rem;
            margin-bottom: 10px !important;
        }

        .author {
            font-size: 0.85rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <svg class="flowers-svg" viewBox="0 0 350 400" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="neon_glow_filter" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
                    <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ff00de" flood-opacity="0.9"/>
                    <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#ff00de" flood-opacity="0.8"/>
                </filter>
                <filter id="neon_center_filter" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
                    <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#ffda00" flood-opacity="1"/>
                </filter>
                
                <radialGradient id="gradient_petal" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" style="stop-color:#ffda00; stop-opacity:1" />
                    <stop offset="60%" style="stop-color:#ff00de; stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#ff00de; stop-opacity:0" />
                </radialGradient>
            </defs>
            
            <path d="M 120 200 L 150 150" stroke="#ff00de" stroke-width="1.5" filter="url(#neon_glow_filter)"/>
            <path d="M 230 200 L 200 150" stroke="#ff00de" stroke-width="1.5" filter="url(#neon_glow_filter)"/>
            
            <g class="neon-filter" transform="translate(60, 200)">
                <path d="M 0,0 L -30,-40 L 0,-100 L 30,-40 Z" fill="url(#gradient_petal)" filter="url(#neon_glow_filter)"/>
                <path d="M 0,0 L -15,-40 L 0,-80 L 15,-40 Z" fill="#fff" opacity="0.6" filter="url(#neon_glow_filter)"/>
                <circle cx="0" cy="-40" r="10" fill="#ffda00" filter="url(#neon_center_filter)"/>
            </g>
            
            <g class="neon-filter" transform="translate(230, 200)">
                <path d="M 0,0 C -30,0 -40,-60 0,-100 C 40,-60 30,0 0,0 Z" fill="url(#gradient_petal)" filter="url(#neon_glow_filter)"/>
                <path d="M 0,0 C -15,0 -20,-40 0,-80 C 20,-40 15,0 0,0 Z" fill="#fff" opacity="0.6" filter="url(#neon_glow_filter)"/>
                <circle cx="0" cy="-40" r="10" fill="#ffda00" filter="url(#neon_center_filter)"/>
            </g>
            
            <g class="neon-filter" transform="translate(175, 120)">
                <path d="M 0,0 C -30,0 -30,-60 0,-100 C 30,-60 30,0 0,0 Z" fill="url(#gradient_petal)" filter="url(#neon_glow_filter)"/>
                <path d="M 0,0 L -10,-40 L 0,-80 L 10,-40 Z" fill="#fff" opacity="0.6" filter="url(#neon_glow_filter)"/>
                <circle cx="0" cy="-40" r="12" fill="#ffda00" filter="url(#neon_center_filter)"/>
            </g>
        </svg>

        <div class="text-content">
            <p class="main-quote">“Mulher virtuosa, quem a achará?<br>O seu valor muito excede<br>o de rubis.”</p>
            <p class="author">Provérbios 31:10</p>
        </div>

    </div>

</body>
</html>
