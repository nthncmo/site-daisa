<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buquê de Flores Mágicas</title>
    <style>
        *, *::after, *::before {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        :root {
            --flower-color: #ff4da6;
            --flower-glow: #ff0080;
            --center-color: #ffeb3b;
            --stem-color: #2d6b38;
            /* Cores adicionadas para o fundo da floresta */
            --forest-deep: #000407;
            --sky-top: #001021;
        }

        body {
            /* Fundo atualizado para o céu estrelado */
            background: 
                radial-gradient(circle at 50% 10%, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 2%),
                radial-gradient(circle at 10% 20%, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 1%),
                radial-gradient(circle at 90% 30%, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0) 1.5%),
                linear-gradient(to top, var(--forest-deep) 0%, #001f3f 60%, var(--sky-top) 100%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Silhuetas da floresta adicionadas ao fundo */
        .forest-frame {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            z-index: 10;
            pointer-events: none;
            background: 
                linear-gradient(to top, var(--forest-deep) 0%, rgba(0,0,0,0) 100%),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 100"><path d="M0 100 C 150 50, 350 150, 500 100 S 850 50, 1000 100 Z" fill="black"/></svg>') repeat-x;
        }

        .forest-frame::before {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 200px;
            height: 400px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400"><path d="M20 400 Q 50 200 20 0 L 180 0 Q 150 200 180 400 Z" fill="black"/><circle cx="50" cy="350" r="15" fill="black"/></svg>') no-repeat bottom left;
            z-index: 11;
        }

        .forest-frame::after {
            content: '';
            position: absolute;
            right: 0;
            bottom: 0;
            width: 250px;
            height: 450px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 450"><path d="M230 450 Q 200 225 230 0 L 20 0 Q 50 225 20 450 Z" fill="black"/><path d="M50 420 Q 30 380 50 340 L 70 340 Q 90 380 70 420 Z" fill="black"/></svg>') no-repeat bottom right;
            z-index: 11;
        }

        .flower-container {
            position: relative;
            width: 600px; /* Limita a largura central */
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 60px;
            z-index: 5; /* Adicionado para ficar atrás da moldura da floresta */
        }

        .flower {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: bottom center;
            bottom: 40px; /* Eleva o ponto de origem */
        }

        /* Ajuste do Buquê: Flores mais próximas e anguladas */
        .flower--1 { left: 50%; transform: translateX(-50%) rotate(-25deg); }
        .flower--1 .flower__line { height: 35vh; animation-delay: 0.2s; }

        .flower--2 { left: 50%; transform: translateX(-50%) rotate(-12deg); z-index: 2; }
        .flower--2 .flower__line { height: 45vh; animation-delay: 0.5s; }

        .flower--3 { left: 50%; transform: translateX(-50%); z-index: 3; }
        .flower--3 .flower__line { height: 52vh; }

        .flower--4 { left: 50%; transform: translateX(-50%) rotate(12deg); z-index: 2; }
        .flower--4 .flower__line { height: 45vh; animation-delay: 0.7s; }

        .flower--5 { left: 50%; transform: translateX(-50%) rotate(25deg); }
        .flower--5 .flower__line { height: 35vh; animation-delay: 0.4s; }

        .flower__line {
            width: 5px;
            height: 0;
            background: linear-gradient(to top, #15361a, var(--stem-color));
            border-radius: 10px;
            animation: growLine 2.5s forwards ease-in-out;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .flower__head {
            position: absolute;
            top: -40px;
            width: 80px;
            height: 80px;
            animation: bloom 2s 1.5s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .flower__petal {
            position: absolute;
            width: 35px;
            height: 70px;
            background: radial-gradient(circle at bottom, #fff 0%, var(--flower-color) 60%, var(--flower-glow) 100%);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 15px rgba(255, 77, 166, 0.3);
            transform-origin: bottom center;
            bottom: 20px;
        }

        /* Criando 6 pétalas para volume */
        .flower__petal--1 { transform: rotate(0deg); }
        .flower__petal--2 { transform: rotate(60deg); }
        .flower__petal--3 { transform: rotate(120deg); }
        .flower__petal--4 { transform: rotate(180deg); }
        .flower__petal--5 { transform: rotate(240deg); }
        .flower__petal--6 { transform: rotate(300deg); }

        .flower__center {
            position: absolute;
            width: 25px;
            height: 25px;
            background: var(--center-color);
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 0 20px var(--center-color), inset 0 0 10px orange;
            animation: glow 2s infinite alternate;
        }

        /* Partículas */
        .light {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            width: 2px;
            height: 2px;
            box-shadow: 0 0 8px var(--center-color);
            animation: floatUp 6s infinite ease-out;
            opacity: 0;
            z-index: 15; /* Adicionado para brilhar por cima de tudo */
        }

        @keyframes growLine { from { height: 0; } }
        @keyframes bloom { to { transform: scale(1) translateY(-20px); } }
        @keyframes glow { 
            from { transform: scale(0.9); filter: brightness(1); } 
            to { transform: scale(1.1); filter: brightness(1.3); } 
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-60vh) translateX(30px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="forest-frame"></div>

    <div class="flower-container">
        <div class="flower flower--1">
            <div class="flower__line"></div>
            <div class="flower__head">
                <div class="flower__petal flower__petal--1"></div>
                <div class="flower__petal flower__petal--2"></div>
                <div class="flower__petal flower__petal--3"></div>
                <div class="flower__petal flower__petal--4"></div>
                <div class="flower__petal flower__petal--5"></div>
                <div class="flower__petal flower__petal--6"></div>
                <div class="flower__center"></div>
            </div>
        </div>
        
        <div class="flower flower--2">
            <div class="flower__line"></div>
            <div class="flower__head">
                <div class="flower__petal flower__petal--1"></div>
                <div class="flower__petal flower__petal--2"></div>
                <div class="flower__petal flower__petal--3"></div>
                <div class="flower__petal flower__petal--4"></div>
                <div class="flower__petal flower__petal--5"></div>
                <div class="flower__petal flower__petal--6"></div>
                <div class="flower__center"></div>
            </div>
        </div>

        <div class="flower flower--3">
            <div class="flower__line"></div>
            <div class="flower__head">
                <div class="flower__petal flower__petal--1"></div>
                <div class="flower__petal flower__petal--2"></div>
                <div class="flower__petal flower__petal--3"></div>
                <div class="flower__petal flower__petal--4"></div>
                <div class="flower__petal flower__petal--5"></div>
                <div class="flower__petal flower__petal--6"></div>
                <div class="flower__center"></div>
            </div>
        </div>

        <div class="flower flower--4">
            <div class="flower__line"></div>
            <div class="flower__head">
                <div class="flower__petal flower__petal--1"></div>
                <div class="flower__petal flower__petal--2"></div>
                <div class="flower__petal flower__petal--3"></div>
                <div class="flower__petal flower__petal--4"></div>
                <div class="flower__petal flower__petal--5"></div>
                <div class="flower__petal flower__petal--6"></div>
                <div class="flower__center"></div>
            </div>
        </div>

        <div class="flower flower--5">
            <div class="flower__line"></div>
            <div class="flower__head">
                <div class="flower__petal flower__petal--1"></div>
                <div class="flower__petal flower__petal--2"></div>
                <div class="flower__petal flower__petal--3"></div>
                <div class="flower__petal flower__petal--4"></div>
                <div class="flower__petal flower__petal--5"></div>
                <div class="flower__petal flower__petal--6"></div>
                <div class="flower__center"></div>
            </div>
        </div>
    </div>

    <div id="lights-container"></div>

    <script>
        function createLight() {
            const container = document.getElementById('lights-container');
            const l = document.createElement('div');
            l.classList.add('light');
            l.style.left = (45 + Math.random() * 10) + '%'; 
            l.style.bottom = '20%';
            l.style.animationDuration = (3 + Math.random() * 3) + 's';
            container.appendChild(l);
            setTimeout(() => l.remove(), 6000);
        }
        setInterval(createLight, 200);
    </script>
</body>
</html>
