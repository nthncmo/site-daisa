<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Mágicas</title>
    <style>
        *, *::after, *::before {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        :root {
            --flower-color: #ff4da6;
            --flower-glow: #ff0080;
            --center-color: #ffeb3b;
        }

        body {
            background-color: #000;
            display: flex;
            align-items: flex-end; /* Alinha na base */
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .flower-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 20px;
        }

        .flower {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: bottom center;
        }

        /* Posições e inclinações */
        .flower--1 { left: 25%; transform: rotate(-12deg) scale(0.9); }
        .flower--2 { left: 50%; transform: translateX(-50%) scale(1.1); z-index: 2; }
        .flower--3 { left: 75%; transform: rotate(12deg) scale(0.9); }

        /* Caule longo e elegante */
        .flower__line {
            width: 4px;
            height: 0;
            background: linear-gradient(to top, #000, #15361a, #2d6b38);
            border-radius: 4px;
            animation: growLine 2.5s forwards ease-in-out;
        }

        /* Cabeça da flor */
        .flower__head {
            position: absolute;
            top: -30px;
            width: 80px;
            height: 80px;
            animation: bloom 3s 1.2s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0);
        }

        /* Pétalas mais arredondadas e brilhantes */
        .flower__petal {
            position: absolute;
            width: 38px;
            height: 75px;
            background: radial-gradient(circle at bottom, #fff 0%, var(--flower-color) 60%, var(--flower-glow) 100%);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 15px rgba(255, 77, 166, 0.5);
            bottom: 15px;
            left: 21px;
            transform-origin: bottom center;
            opacity: 0.9;
        }

        .flower__petal--1 { transform: rotate(-35deg); }
        .flower__petal--2 { transform: rotate(0deg); height: 82px; z-index: 2; }
        .flower__petal--3 { transform: rotate(35deg); }

        /* Centro com brilho intenso estilo vaga-lume */
        .flower__center {
            position: absolute;
            width: 20px;
            height: 20px;
            background: var(--center-color);
            border-radius: 50%;
            bottom: 15px;
            left: 30px;
            z-index: 4;
            box-shadow: 0 0 20px var(--center-color), 
                        0 0 40px var(--center-color),
                        0 0 60px #fff;
            animation: glow 2s infinite alternate;
        }

        /* Grama no fundo */
        .grass {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            z-index: 1;
            filter: blur(1px);
        }

        /* Partículas subindo */
        .light {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            width: 3px;
            height: 3px;
            box-shadow: 0 0 10px var(--center-color);
            animation: floatUp 4s infinite linear;
            opacity: 0;
        }

        /* Animações */
        @keyframes growLine {
            to { height: 65vh; } /* Caule ocupa 65% da altura da tela */
        }

        @keyframes bloom {
            to { transform: scale(1); }
        }

        @keyframes glow {
            from { transform: scale(0.9); opacity: 0.8; }
            to { transform: scale(1.1); opacity: 1; }
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-40vh) translateX(30px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="flower-container">
        <div class="flower flower--1">
            <div class="flower__line"></div>
            <div class="flower__head">
                <div class="flower__petal flower__petal--1"></div>
                <div class="flower__petal flower__petal--2"></div>
                <div class="flower__petal flower__petal--3"></div>
                <div class="flower__center"></div>
            </div>
        </div>

        <div class="flower flower--2">
            <div class="flower__line"></div>
            <div class="flower__head">
                <div class="flower__petal flower__petal--1"></div>
                <div class="flower__petal flower__petal--2"></div>
                <div class="flower__petal flower__petal--3"></div>
                <div class="flower__center"></div>
            </div>
        </div>

        <div class="flower flower--3">
            <div class="flower__line"></div>
            <div class="flower__head">
                <div class="flower__petal flower__petal--1"></div>
                <div class="flower__petal flower__petal--2"></div>
                <div class="flower__petal flower__petal--3"></div>
                <div class="flower__center"></div>
            </div>
        </div>
    </div>

    <div class="grass" id="grass-container"></div>
    <div id="lights-container"></div>

    <script>
        const grassContainer = document.getElementById('grass-container');
        for(let i = 0; i < 50; i++) {
            let blade = document.createElement('div');
            blade.style.position = 'absolute';
            blade.style.bottom = '-10px';
            blade.style.width = '3px';
            blade.style.height = (40 + Math.random() * 100) + 'px';
            blade.style.background = 'linear-gradient(to top, #000, #0a1f0f, #1a4421)';
            blade.style.left = Math.random() * 105 + '%';
            blade.style.borderRadius = '50% 50% 0 0';
            blade.style.transform = `rotate(${-30 + Math.random() * 60}deg)`;
            blade.style.opacity = 0.6;
            grassContainer.appendChild(blade);
        }

        function createLight() {
            const l = document.createElement('div');
            l.classList.add('light');
            l.style.left = (Math.random() * 80 + 10) + '%';
            l.style.bottom = '20%';
            l.style.animationDuration = (3 + Math.random() * 3) + 's';
            document.getElementById('lights-container').appendChild(l);
            setTimeout(() => l.remove(), 4000);
        }
        setInterval(createLight, 300);
    </script>
</body>
</html>
